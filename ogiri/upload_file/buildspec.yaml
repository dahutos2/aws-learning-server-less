version: 0.2
env:
  variables:
    FLUTTER_SDK: /opt/flutter
    ANDROID_SDK_ROOT: /usr/local/android-sdk
    GRADLE_USER_HOME: /root/.gradle
    PUB_CACHE: /root/.pub-cache
    S3_BUCKET: ogiri-ai-builds
    FLUTTER_VERSION: 3.13.4
    ANDROID_SDK_VERSION: android-30
    BUILD_TOOLS_VERSION: 30.0.3
phases:
  install:
    commands:
      - apt-get update
      - apt-get install -y openjdk-11-jdk
      - |
        if [ ! -d "$FLUTTER_SDK/flutter" ]; then
          mkdir -p $FLUTTER_SDK
          aws s3 cp s3://$S3_BUCKET/flutter/flutter_$FLUTTER_VERSION.tar.xz $FLUTTER_SDK/flutter.tar.xz || curl -s https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_$FLUTTER_VERSION-stable.tar.xz -o $FLUTTER_SDK/flutter.tar.xz
          tar -xf $FLUTTER_SDK/flutter.tar.xz -C $FLUTTER_SDK
          rm $FLUTTER_SDK/flutter.tar.xz
          aws s3 cp $FLUTTER_SDK/flutter.tar.xz s3://$S3_BUCKET/flutter/flutter_$FLUTTER_VERSION.tar.xz
        fi
      - |
        if [ ! -d "$ANDROID_SDK_ROOT/platforms/$ANDROID_SDK_VERSION" ]; then
          curl -s https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip -o cmdline-tools.zip
          unzip cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          yes | $ANDROID_SDK_ROOT/cmdline-tools/tools/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/tools/bin/sdkmanager "platform-tools" "platforms;$ANDROID_SDK_VERSION" "build-tools;$BUILD_TOOLS_VERSION"
          aws s3 sync $ANDROID_SDK_ROOT/ s3://$S3_BUCKET/android-sdk/
        else
          aws s3 sync s3://$S3_BUCKET/android-sdk/ $ANDROID_SDK_ROOT/
        fi
      - |
        if [ ! -d "$GRADLE_USER_HOME/wrapper" ]; then
          mkdir -p $GRADLE_USER_HOME/wrapper
          aws s3 sync s3://$S3_BUCKET/gradle/wrapper $GRADLE_USER_HOME/wrapper
        fi
      - |
        if [ ! -d "$GRADLE_USER_HOME/caches" ]; then
          mkdir -p $GRADLE_USER_HOME/caches
          aws s3 sync s3://$S3_BUCKET/gradle/caches $GRADLE_USER_HOME/caches
        fi
      - export PATH="$FLUTTER_SDK/flutter/bin:$PATH"
  pre_build:
    commands:
      - flutter doctor
      - flutter pub get
  build:
    commands:
      - flutter build apk --release
  post_build:
    commands:
      - aws s3 sync $PUB_CACHE s3://$S3_BUCKET/dart-cache/
      - aws s3 sync $GRADLE_USER_HOME/wrapper s3://$S3_BUCKET/gradle/wrapper/
      - aws s3 sync $GRADLE_USER_HOME/caches s3://$S3_BUCKET/gradle/caches/
      - aws s3 sync $ANDROID_SDK_ROOT/ s3://$S3_BUCKET/android-sdk/
artifacts:
  files:
    - app-release.apk
  discard-paths: yes
  base-directory: build/app/outputs/flutter-apk
cache:
  paths:
    - $PUB_CACHE/**
    - $ANDROID_SDK_ROOT/**
    - $GRADLE_USER_HOME/caches/**
    - $GRADLE_USER_HOME/wrapper/**
